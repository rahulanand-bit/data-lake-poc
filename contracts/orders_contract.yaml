name: orders
domain: dsb
source:
  databases:
    - source_server_id: srv1
      database: mbs_poc
      schema: dbo
      table: orders
    - source_server_id: srv2
      database: mbs_poc
      schema: dbo
      table: orders
    - source_server_id: srv3
      database: mbs_poc
      schema: dbo
      table: orders
  primary_key:
    - source_server_id
    - order_id
  cdc_enabled: true
target:
  raw_table: orders_raw
columns:
  - name: source_server_id
    source_type: STRING_LITERAL
    target_type: STRING
    nullable: false
  - name: order_id
    source_type: INT
    target_type: INT
    nullable: false
  - name: customer_name
    source_type: NVARCHAR(100)
    target_type: STRING
    nullable: true
  - name: amount
    source_type: DECIMAL(12,2)
    target_type: DECIMAL(12,2)
    nullable: true
  - name: status
    source_type: NVARCHAR(20)
    target_type: STRING
    nullable: true
  - name: updated_at
    source_type: DATETIME2
    target_type: TIMESTAMP(3)
    nullable: false
