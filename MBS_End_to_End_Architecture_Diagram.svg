<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">MBS End-to-End Data Lake Architecture</title>
  <desc id="desc">Architecture diagram showing current MBS components feeding a governed lakehouse with CDC, Kafka, Bronze, Silver, Gold, StarRocks, Power BI, and AI analytics.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#edf2f7"/>
    </linearGradient>
    <linearGradient id="leftPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6fffa"/>
      <stop offset="100%" stop-color="#c6f6d5"/>
    </linearGradient>
    <linearGradient id="midPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ebf8ff"/>
      <stop offset="100%" stop-color="#bee3f8"/>
    </linearGradient>
    <linearGradient id="rightPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#fbd38d"/>
    </linearGradient>
    <linearGradient id="govPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf5ff"/>
      <stop offset="100%" stop-color="#e9d8fd"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#4a5568"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #1a202c; }
      .subtitle { font: 500 16px Arial, sans-serif; fill: #4a5568; }
      .panel-title { font: 700 20px Arial, sans-serif; fill: #1a202c; }
      .box-title { font: 700 16px Arial, sans-serif; fill: #1a202c; }
      .box-text { font: 500 13px Arial, sans-serif; fill: #2d3748; }
      .small-text { font: 500 12px Arial, sans-serif; fill: #4a5568; }
      .label { font: 700 13px Arial, sans-serif; fill: #2d3748; }
      .note { font: 600 13px Arial, sans-serif; fill: #744210; }
      .panel { stroke: #cbd5e0; stroke-width: 2; rx: 24; }
      .box { fill: #ffffff; stroke: #a0aec0; stroke-width: 2; rx: 16; }
      .layer-bronze { fill: #f6ad55; }
      .layer-silver { fill: #cbd5e0; }
      .layer-gold { fill: #f6e05e; }
      .line { stroke: #4a5568; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .soft-line { stroke: #718096; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .dashed { stroke-dasharray: 9 7; }
    </style>
  </defs>

  <rect width="1800" height="1100" fill="url(#bg)"/>

  <text x="900" y="52" text-anchor="middle" class="title">MBS End-to-End Data Lake Architecture</text>
  <text x="900" y="80" text-anchor="middle" class="subtitle">Current MBS sources and reporting flow connected to the proposed governed lakehouse solution</text>

  <rect x="40" y="110" width="410" height="860" class="panel" fill="url(#leftPanel)"/>
  <text x="245" y="145" text-anchor="middle" class="panel-title">Current MBS Landscape</text>

  <rect x="75" y="175" width="340" height="92" class="box"/>
  <text x="245" y="205" text-anchor="middle" class="box-title">MBS Applications</text>
  <text x="245" y="228" text-anchor="middle" class="box-text">.NET backend</text>
  <text x="245" y="248" text-anchor="middle" class="box-text">React web + Android apps</text>

  <rect x="75" y="315" width="340" height="110" class="box"/>
  <text x="245" y="345" text-anchor="middle" class="box-title">DSB Operational DB</text>
  <text x="245" y="368" text-anchor="middle" class="box-text">Doorstep Banking Services</text>
  <text x="245" y="388" text-anchor="middle" class="box-text">Single DB with logical bank separation</text>
  <text x="245" y="408" text-anchor="middle" class="small-text">KYC, NACH, CPV and related logs</text>

  <rect x="75" y="465" width="340" height="110" class="box"/>
  <text x="245" y="495" text-anchor="middle" class="box-title">FI Bank Databases</text>
  <text x="245" y="518" text-anchor="middle" class="box-text">Separate DB per bank</text>
  <text x="245" y="538" text-anchor="middle" class="box-text">1 agent works for 1 bank</text>
  <text x="245" y="558" text-anchor="middle" class="small-text">Fixed + mobile team model</text>

  <rect x="75" y="615" width="340" height="110" class="box"/>
  <text x="245" y="645" text-anchor="middle" class="box-title">Bank Excel Feeds</text>
  <text x="245" y="668" text-anchor="middle" class="box-text">Bank-owned asset data</text>
  <text x="245" y="688" text-anchor="middle" class="box-text">Excel to DB to reporting flow today</text>
  <text x="245" y="708" text-anchor="middle" class="small-text">Different formats and validation rules</text>

  <rect x="75" y="765" width="340" height="110" class="box"/>
  <text x="245" y="795" text-anchor="middle" class="box-title">Current Reporting DB</text>
  <text x="245" y="818" text-anchor="middle" class="box-text">Near-real-time replace-style sync</text>
  <text x="245" y="838" text-anchor="middle" class="box-text">BI tools query directly</text>
  <text x="245" y="858" text-anchor="middle" class="small-text">Current pain: slow reports on large logs</text>

  <rect x="495" y="110" width="790" height="860" class="panel" fill="url(#midPanel)"/>
  <text x="890" y="145" text-anchor="middle" class="panel-title">Proposed Governed Lakehouse Solution</text>

  <rect x="535" y="180" width="210" height="95" class="box"/>
  <text x="640" y="210" text-anchor="middle" class="box-title">CDC for DB Sources</text>
  <text x="640" y="233" text-anchor="middle" class="box-text">Capture inserts, updates, deletes</text>
  <text x="640" y="253" text-anchor="middle" class="small-text">Avoid full table reloads</text>

  <rect x="810" y="180" width="210" height="95" class="box"/>
  <text x="915" y="210" text-anchor="middle" class="box-title">File Intake for Excel</text>
  <text x="915" y="233" text-anchor="middle" class="box-text">Schema validation and metadata</text>
  <text x="915" y="253" text-anchor="middle" class="small-text">Quarantine invalid files</text>

  <rect x="1085" y="180" width="160" height="95" class="box"/>
  <text x="1165" y="210" text-anchor="middle" class="box-title">Kafka</text>
  <text x="1165" y="233" text-anchor="middle" class="box-text">Near-real-time event</text>
  <text x="1165" y="253" text-anchor="middle" class="box-text">movement and buffering</text>

  <rect x="560" y="335" width="650" height="420" class="box" style="fill:#f8fafc; stroke:#90cdf4; stroke-width:2.5;"/>
  <text x="885" y="368" text-anchor="middle" class="box-title">Lakehouse Storage and Processing</text>

  <rect x="600" y="405" width="170" height="285" class="box"/>
  <rect x="600" y="405" width="170" height="52" rx="16" class="layer-bronze"/>
  <text x="685" y="438" text-anchor="middle" class="box-title">Bronze</text>
  <text x="685" y="485" text-anchor="middle" class="box-text">Raw source-faithful data</text>
  <text x="685" y="507" text-anchor="middle" class="box-text">DB snapshots, logs, files</text>
  <text x="685" y="529" text-anchor="middle" class="box-text">Immutable and auditable</text>
  <text x="685" y="565" text-anchor="middle" class="small-text">Partition by bank/date/source</text>

  <rect x="800" y="405" width="170" height="285" class="box"/>
  <rect x="800" y="405" width="170" height="52" rx="16" class="layer-silver"/>
  <text x="885" y="438" text-anchor="middle" class="box-title">Silver</text>
  <text x="885" y="485" text-anchor="middle" class="box-text">Cleaned and standardized</text>
  <text x="885" y="507" text-anchor="middle" class="box-text">Deduped and validated</text>
  <text x="885" y="529" text-anchor="middle" class="box-text">Conformed business schema</text>
  <text x="885" y="565" text-anchor="middle" class="small-text">DSB, FI, Excel data aligned</text>

  <rect x="1000" y="405" width="170" height="285" class="box"/>
  <rect x="1000" y="405" width="170" height="52" rx="16" class="layer-gold"/>
  <text x="1085" y="438" text-anchor="middle" class="box-title">Gold</text>
  <text x="1085" y="485" text-anchor="middle" class="box-text">Business-ready marts</text>
  <text x="1085" y="507" text-anchor="middle" class="box-text">Revenue, agent, location KPIs</text>
  <text x="1085" y="529" text-anchor="middle" class="box-text">AI-ready feature tables</text>
  <text x="1085" y="565" text-anchor="middle" class="small-text">Fast reporting and reuse</text>

  <rect x="660" y="775" width="450" height="130" class="box"/>
  <text x="885" y="808" text-anchor="middle" class="box-title">Transformation and Data Quality Workflows</text>
  <text x="885" y="834" text-anchor="middle" class="box-text">Standardization, joins, deduplication, reconciliation</text>
  <text x="885" y="856" text-anchor="middle" class="box-text">Late-arriving data handling and idempotent merges</text>
  <text x="885" y="878" text-anchor="middle" class="small-text">Build marts like agent_day_summary and bank_month_revenue_summary</text>

  <rect x="1310" y="110" width="450" height="395" class="panel" fill="url(#rightPanel)"/>
  <text x="1535" y="145" text-anchor="middle" class="panel-title">Serving and Consumption</text>

  <rect x="1360" y="185" width="350" height="105" class="box"/>
  <text x="1535" y="217" text-anchor="middle" class="box-title">StarRocks Query Engine</text>
  <text x="1535" y="240" text-anchor="middle" class="box-text">High-speed analytics serving layer</text>
  <text x="1535" y="260" text-anchor="middle" class="box-text">Accelerates Power BI dashboard queries</text>

  <rect x="1360" y="330" width="165" height="110" class="box"/>
  <text x="1442" y="362" text-anchor="middle" class="box-title">Power BI</text>
  <text x="1442" y="385" text-anchor="middle" class="box-text">Executive and</text>
  <text x="1442" y="405" text-anchor="middle" class="box-text">operational reports</text>

  <rect x="1545" y="330" width="165" height="110" class="box"/>
  <text x="1627" y="362" text-anchor="middle" class="box-title">AI Analytics</text>
  <text x="1627" y="385" text-anchor="middle" class="box-text">Agent scoring,</text>
  <text x="1627" y="405" text-anchor="middle" class="box-text">forecasting, anomalies</text>

  <rect x="1310" y="535" width="450" height="435" class="panel" fill="url(#govPanel)"/>
  <text x="1535" y="570" text-anchor="middle" class="panel-title">Governance, Security and Operations</text>

  <rect x="1360" y="610" width="350" height="120" class="box"/>
  <text x="1535" y="642" text-anchor="middle" class="box-title">Compliance Controls</text>
  <text x="1535" y="665" text-anchor="middle" class="box-text">Bank-wise segregation</text>
  <text x="1535" y="685" text-anchor="middle" class="box-text">Masking, encryption, approval-based summarized access</text>
  <text x="1535" y="705" text-anchor="middle" class="small-text">Transactional data movement remains restricted</text>

  <rect x="1360" y="755" width="350" height="90" class="box"/>
  <text x="1535" y="787" text-anchor="middle" class="box-title">Retention and Purging</text>
  <text x="1535" y="810" text-anchor="middle" class="box-text">Bank policy driven purge workflows with audit logs</text>

  <rect x="1360" y="870" width="350" height="70" class="box"/>
  <text x="1535" y="900" text-anchor="middle" class="box-title">Monitoring and Lineage</text>
  <text x="1535" y="922" text-anchor="middle" class="box-text">Pipeline SLA, DQ scorecards, access traceability</text>

  <path d="M245 267 L245 315" class="soft-line"/>
  <path d="M245 425 L245 465" class="soft-line"/>
  <path d="M245 575 L245 615" class="soft-line"/>
  <path d="M245 725 L245 765" class="soft-line"/>

  <path d="M415 370 L470 370 L470 228 L535 228" class="line"/>
  <path d="M415 520 L485 520 L485 242 L535 242" class="line"/>
  <path d="M415 670 L470 670 L470 295 L915 295 L915 275" class="line"/>
  <path d="M415 820 L520 820 L520 548 L600 548" class="line dashed"/>

  <path d="M745 228 L770 228 L770 295 L1165 295 L1165 275" class="line"/>
  <path d="M1165 275 L1165 315 L685 315 L685 405" class="line"/>
  <path d="M915 275 L915 315 L640 315 L640 405" class="soft-line"/>

  <path d="M770 548 L800 548" class="line"/>
  <path d="M970 548 L1000 548" class="line"/>

  <path d="M1170 470 L1270 470 L1270 238 L1360 238" class="line"/>
  <path d="M1170 580 L1235 580 L1235 470 L1442 470 L1442 440" class="soft-line"/>
  <path d="M1170 615 L1270 615 L1270 470 L1627 470 L1627 440" class="soft-line"/>

  <path d="M1110 810 L1290 810 L1290 720 L1360 720" class="soft-line dashed"/>
  <path d="M1110 840 L1290 840 L1290 830 L1360 830" class="soft-line dashed"/>
  <path d="M1110 870 L1290 870 L1290 930 L1360 930" class="soft-line dashed"/>

  <text x="560" y="1015" class="label">Primary Flow:</text>
  <text x="655" y="1015" class="box-text">Sources -&gt; CDC / File Intake -&gt; Kafka / Ingestion -&gt; Bronze -&gt; Silver -&gt; Gold -&gt; StarRocks -&gt; Power BI / AI</text>

  <text x="560" y="1048" class="label">MBS-Specific Notes:</text>
  <text x="715" y="1048" class="box-text">DSB is the first pilot domain, FI includes separate bank DBs and Excel feeds, and governance controls apply across every layer.</text>

  <rect x="60" y="992" width="410" height="68" rx="16" fill="#fffaf0" stroke="#d69e2e" stroke-width="2"/>
  <text x="265" y="1021" text-anchor="middle" class="note">Current issue addressed by this design</text>
  <text x="265" y="1043" text-anchor="middle" class="small-text">Move heavy reporting away from direct queries on large log tables in the reporting DB.</text>
</svg>
